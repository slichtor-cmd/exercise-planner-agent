name: Continuous Integration & Agent Evaluation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_and_eval:
    name: Run Unit, Integration & ADK Eval Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic google-adk

      - name: Run Unit & Integration Test Suites
        run: |
          pytest tests/

      - name: Run ADK Evaluation Benchmark
        run: |
          python -m exercise_planner_agent.run_eval
